<!DOCTYPE html>
<html lang="da">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Thy Oak Houses — Gæstekort</title>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/leaflet/1.9.4/leaflet.min.css"/>
<script src="https://cdnjs.cloudflare.com/ajax/libs/leaflet/1.9.4/leaflet.min.js"></script>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; background: #0d1117; color: #e6edf3; min-height: 100vh; padding: 20px; }

  .header { display: flex; justify-content: space-between; align-items: flex-end; flex-wrap: wrap; gap: 10px; border-bottom: 1px solid #21262d; padding-bottom: 14px; margin-bottom: 14px; }
  h1 { font-size: 20px; font-weight: 600; color: #f0f6fc; }
  .subtitle { font-size: 11px; color: #4a6080; letter-spacing: 0.08em; margin-top: 3px; }

  .stats { display: flex; gap: 8px; flex-wrap: wrap; }
  .stat { background: #161b22; border: 1px solid #21262d; border-radius: 8px; padding: 6px 14px; }
  .stat-label { font-size: 9px; color: #4a6080; text-transform: uppercase; letter-spacing: 0.1em; }
  .stat-value { font-size: 13px; font-weight: 600; color: #f0f6fc; margin-top: 1px; }

  #filters { display: flex; gap: 5px; flex-wrap: wrap; margin-bottom: 12px; }
  .filter-btn { padding: 3px 10px; border-radius: 20px; border: 1px solid #21262d; background: transparent; color: #4a6080; font-size: 11px; cursor: pointer; font-family: inherit; transition: all 0.15s; }

  #map { height: 520px; border-radius: 12px; border: 1px solid #21262d; }

  #legend { display: flex; gap: 14px; margin-top: 12px; flex-wrap: wrap; }
  .legend-item { display: flex; align-items: center; gap: 5px; font-size: 11px; color: #4a6080; cursor: pointer; }
  .legend-dot { width: 8px; height: 8px; border-radius: 50%; flex-shrink: 0; }

  .leaflet-popup-content-wrapper {
    background: #0d1117 !important;
    border: 1px solid #30363d !important;
    color: #e6edf3 !important;
    border-radius: 10px !important;
    box-shadow: 0 8px 24px rgba(0,0,0,0.6) !important;
  }
  .leaflet-popup-tip { background: #0d1117 !important; }
  .leaflet-popup-content { margin: 10px 14px !important; }
  .pop-city { font-size: 15px; font-weight: 600; color: #f0f6fc; }
  .pop-country { font-size: 10px; text-transform: uppercase; letter-spacing: 0.08em; margin-bottom: 7px; }
  .pop-stats { font-size: 13px; color: #c9d1d9; line-height: 1.9; }

  .leaflet-control-zoom a { background: #161b22 !important; color: #e6edf3 !important; border-color: #30363d !important; }
  .leaflet-control-attribution { background: rgba(13,17,23,0.8) !important; color: #4a6080 !important; }
  .leaflet-control-attribution a { color: #4a6080 !important; }

  #loading-overlay { position: fixed; inset: 0; background: rgba(13,17,23,0.9); z-index: 9999; display: flex; align-items: center; justify-content: center; font-size: 14px; color: #4a6080; transition: opacity 0.5s; }
</style>
</head>
<body>

<div id="loading-overlay">Henter de nyeste data...</div>

<div class="header">
  <div>
    <h1>🌲 Thy Oak Houses — Gæstekort</h1>
    <p class="subtitle" id="subtitle-text">HENTER DATA...</p>
  </div>
  <div class="stats">
    <div class="stat"><div class="stat-label">Gæster</div><div class="stat-value" id="s-guests">0</div></div>
    <div class="stat"><div class="stat-label">Top by</div><div class="stat-value" id="s-top">—</div></div>
    <div class="stat"><div class="stat-label">Bedst kr/book</div><div class="stat-value" id="s-kr">—</div></div>
  </div>
</div>

<div id="filters"></div>
<div style="display:flex;gap:14px;align-items:flex-start;">
  <div style="flex:1;min-width:0;">
    <div id="map"></div>
  </div>
  <div id="leaderboard" style="width:200px;flex-shrink:0;background:#161b22;border:1px solid #21262d;border-radius:12px;padding:14px;"></div>
</div>
<div id="legend"></div>

<script>
// ============================================================
// DATA FETCH FRA DIN APPS SCRIPT URL HERUNDER
// ============================================================
const API_URL = 'YOUR_APPS_SCRIPT_WEB_APP_URL_HERE'; // SÆT DIN URL HER!

let GUESTS = [];

const OAK = { lat: 57.04, lng: 8.42, name: "Oak House, Thy" };

const COLORS = {
  "Tyskland":  "#E63946",
  "Danmark":   "#4895EF",
  "Schweiz":   "#2A9D8F",
  "Holland":   "#F4D35E",
  "Østrig":    "#F4A261",
  "Belgien":   "#A8DADC",
  "Frankrig":  "#9B5DE5",
  "Finland":   "#00BBF9",
  "UK":        "#80B918",
  "Canada":    "#FF6B6B",
  "Sydkorea":  "#C77DFF",
  "Rumænien":  "#FF9F1C",
  "Sverige":   "#58a6ff",
  "Norge":     "#94D2BD",
  "Italien":   "#FAA307",
  "Spanien":   "#F48C06",
  "USA":       "#D00000"
};

// Tilføj en generisk funktion til hvis landefarven mangler
function getCountryColor(country) {
  if (COLORS[country]) return COLORS[country];
  // Hvis farven for et nyere land ikke findes, lav en hurtig hash til en farve
  let hash = 0;
  for (let i = 0; i < country.length; i++) { hash = country.charCodeAt(i) + ((hash << 5) - hash); }
  const c = (hash & 0x00FFFFFF).toString(16).toUpperCase();
  return "#" + "000000".substring(0, 6 - c.length) + c;
}

// ============================================================
// KORT — Leaflet setup
// ============================================================
const map = L.map('map', { zoomControl: true }).setView([54, 12], 5);

L.tileLayer('https://{s}.basemaps.cartocdn.com/dark_all/{z}/{x}/{y}{r}.png', {
  attribution: '© OpenStreetMap © CARTO',
  maxZoom: 14
}).addTo(map);

// Oak House markør
const oakIcon = L.divIcon({
  className: '',
  html: `<div style="background:#238636;border:2px solid #2ea043;border-radius:50%;width:26px;height:26px;display:flex;align-items:center;justify-content:center;font-size:14px;box-shadow:0 0 0 6px rgba(35,134,54,0.15);">🌲</div>`,
  iconSize: [26, 26], iconAnchor: [13, 13]
});

L.marker([OAK.lat, OAK.lng], { icon: oakIcon, zIndexOffset: 1000 })
  .addTo(map)
  .bindPopup(`
    <div class="pop-city">Thy Oak Houses</div>
    <div class="pop-country" style="color:#2ea043;">Thisted, Nordjylland</div>
    <div class="pop-stats">
      🌲 Tiny Oak House — 5 km til havet<br>
      🌊 Ocean Oak House — 1 km til havet
    </div>
  `);

let markers = [];
let lines = [];
let currentFilter = "Alle";

function render() {
  markers.forEach(m => map.removeLayer(m));
  lines.forEach(l => map.removeLayer(l));
  markers = []; lines = [];

  const shown = currentFilter === "Alle" ? GUESTS : GUESTS.filter(g => g.country === currentFilter);

  shown.forEach(g => {
    const col = getCountryColor(g.country);
    const r = g.count >= 10 ? 20 : g.count >= 5 ? 16 : g.count >= 3 ? 13 : g.count === 2 ? 10 : 8;

    // Linje fra Oak House
    const line = L.polyline([[OAK.lat, OAK.lng], [g.lat, g.lng]], {
      color: col,
      weight: g.count >= 5 ? 2 : 1,
      opacity: g.count >= 5 ? 0.5 : 0.25,
      dashArray: "5, 8"
    }).addTo(map);
    lines.push(line);

    // By-markør
    const icon = L.divIcon({
      className: '',
      html: `<div style="
        background:${col};
        border-radius:50%;
        width:${r*2}px;height:${r*2}px;
        display:flex;align-items:center;justify-content:center;
        font-size:${r > 12 ? 10 : 9}px;font-weight:600;color:#fff;
        border:2px solid rgba(255,255,255,0.4);
        box-shadow:0 2px 8px rgba(0,0,0,0.4);
        opacity:0.9;
      ">${g.count > 1 ? g.count : ''}</div>`,
      iconSize: [r*2, r*2], iconAnchor: [r, r]
    });

    let popup = `
      <div class="pop-city">${g.city}</div>
      <div class="pop-country" style="color:${col};">${g.country}</div>
      <div class="pop-stats">
        🧳 <b>${g.count}</b> reservation${g.count > 1 ? 'er' : ''}
        ${g.nights > 0 ? `<br>🌙 <b>${g.nights}</b> nætter i snit` : ''}
        ${g.kr > 0 ? `<br>💰 <b>${g.kr.toLocaleString('da')} kr</b> i snit` : ''}
      </div>
    `;

    const m = L.marker([g.lat, g.lng], { icon })
      .addTo(map)
      .bindPopup(popup);

    m.on('mouseover', () => {
      line.setStyle({ opacity: 0.9, weight: 2.5, dashArray: null });
      m.openPopup();
    });
    m.on('mouseout', () => {
      line.setStyle({ opacity: g.count >= 5 ? 0.5 : 0.25, weight: g.count >= 5 ? 2 : 1, dashArray: "5, 8" });
    });

    markers.push(m);
  });

  // Opdater stats header
  const totalBookings = shown.reduce((s, g) => s + g.count, 0);
  const totalCities   = new Set(shown.map(g => g.city)).size;
  const totalCountries = new Set(shown.map(g => g.country)).size;

  document.getElementById('subtitle-text').textContent = `${totalBookings} BOOKINGER · ${totalCities} BYER · ${totalCountries} LANDE`;

  // Top val
  const top = [...shown].sort((a, b) => b.count - a.count)[0];
  const best = [...shown].filter(g => g.kr > 0).sort((a, b) => b.kr - a.kr)[0];
  
  document.getElementById('s-guests').textContent = totalBookings;
  document.getElementById('s-top').textContent = top ? `${top.city} (${top.count})` : '—';
  document.getElementById('s-kr').textContent = best ? `${best.city} · ${best.kr.toLocaleString('da')} kr` : '—';
}

function initMapLegendAndFilters() {
  const fd = document.getElementById('filters');
  fd.innerHTML = ''; // Renser eksisterende
  
  const ld = document.getElementById('legend');
  ld.innerHTML = '';

  const unikkeLandeSet = new Set(GUESTS.map(g => g.country));
  const unikkeLande = ['Alle', ...Array.from(unikkeLandeSet).sort()];

  // Filterknapper
  unikkeLande.forEach(c => {
    const btn = document.createElement('button');
    btn.className = 'filter-btn';
    btn.textContent = c;
    const col = getCountryColor(c);
    
    if (c === 'Alle') {
      btn.style.cssText = `border-color:#58a6ff;background:#58a6ff22;color:#58a6ff;`;
    }
    
    btn.addEventListener('click', () => {
      currentFilter = c;
      document.querySelectorAll('.filter-btn').forEach(b => {
        b.style.borderColor = ''; b.style.background = ''; b.style.color = '';
      });
      btn.style.cssText = c === 'Alle' 
        ? `border-color:#58a6ff;background:#58a6ff22;color:#58a6ff;`
        : `border-color:${col};background:${col}22;color:${col};`;
      renderLeaderboard();
      render();
    });
    fd.appendChild(btn);
  });

  // Landeforklaring
  unikkeLandeSet.forEach(c => {
    const col = getCountryColor(c);
    const n = GUESTS.filter(g => g.country === c).reduce((s, g) => s + g.count, 0);
    if (!n) return;
    const item = document.createElement('div');
    item.className = 'legend-item';
    item.innerHTML = `<div class="legend-dot" style="background:${col}"></div>${c} <span style="color:${col};font-weight:600;">${n}</span>`;
    item.addEventListener('click', () => {
      currentFilter = currentFilter === c ? 'Alle' : c;
      document.querySelectorAll('.filter-btn').forEach(b => {
        b.style.borderColor = ''; b.style.background = ''; b.style.color = '';
      });
      renderLeaderboard();
      render();
    });
    ld.appendChild(item);
  });
}

function renderLeaderboard() {
  const shown = currentFilter === "Alle" ? GUESTS : GUESTS.filter(g => g.country === currentFilter);
  const top5 = [...shown].sort((a, b) => b.count - a.count).slice(0, 5);
  const max = top5[0] ? top5[0].count : 1;
  const lb = document.getElementById('leaderboard');
  lb.innerHTML = `
    <div style="font-size:11px;font-weight:600;color:#4a6080;text-transform:uppercase;letter-spacing:0.1em;margin-bottom:12px;">Top 5 byer</div>
    ${top5.map((g, i) => {
      const col = getCountryColor(g.country);
      const pct = Math.round((g.count / max) * 100);
      const medals = ['🥇','🥈','🥉','4️⃣','5️⃣'];
      return `
        <div style="margin-bottom:12px;">
          <div style="display:flex;justify-content:space-between;align-items:baseline;margin-bottom:4px;">
            <div style="font-size:13px;font-weight:600;color:#f0f6fc;">${medals[i]} ${g.city}</div>
            <div style="font-size:12px;font-weight:600;color:${col};">${g.count}</div>
          </div>
          <div style="background:#21262d;border-radius:4px;height:5px;overflow:hidden;">
            <div style="background:${col};height:100%;width:${pct}%;border-radius:4px;transition:width 0.4s;"></div>
          </div>
          <div style="font-size:10px;color:#4a6080;margin-top:3px;">${g.country}${g.kr > 0 ? ` · ${g.kr.toLocaleString('da')} kr/book` : ''}</div>
        </div>
      `;
    }).join('')}
  `;
}

// ============================================================
// HENT OG SAML DATA FRA SCRIPT
// ============================================================
async function loadServerData() {
  try {
    if (API_URL === 'YOUR_APPS_SCRIPT_WEB_APP_URL_HERE') {
      alert("Husk at indsætte din Google Apps Script URL i index.html koden.");
      document.getElementById('loading-overlay').style.opacity = '0';
      return;
    }

    const res = await fetch(API_URL);
    const apiData = await res.json();
    
    const cityMap = {};

    apiData.forEach(row => {
      const parts = row.Location.split(',');
      const by = parts[0].trim();
      const land = parts.length > 1 ? parts[parts.length - 1].trim() : "Ukendt";
      
      const key = by + land;
      
      if (!cityMap[key]) {
        cityMap[key] = {
          city: by,
          country: land,
          lat: parseFloat(row.Lat) || 0,
          lng: parseFloat(row.Lng) || 0,
          count: 0,
          totalNights: 0,
          totalKr: 0
        };
      }
      
      cityMap[key].count += 1;
      
      if (row.Nights) cityMap[key].totalNights += parseInt(row.Nights);
      
      if (row.Payout && row.Payout !== '0') {
        const numMatch = row.Payout.replace(/\./g, '').replace(',', '.').match(/[\d\.]+/);
        if (numMatch) {
          cityMap[key].totalKr += parseFloat(numMatch[0]);
        }
      }
    });

    GUESTS = Object.values(cityMap).map(g => ({
      ...g,
      nights: g.count > 0 ? parseFloat((g.totalNights / g.count).toFixed(1)) : 0,
      kr: g.totalKr > 0 ? Math.round(g.totalKr / g.count) : 0
    }));

    initMapLegendAndFilters();
    renderLeaderboard();
    render();
    
    // Fjern loading skærm
    const obs = document.getElementById('loading-overlay');
    obs.style.opacity = '0';
    setTimeout(() => obs.style.display = 'none', 500);
    
  } catch(e) {
    console.error("Fejl i loading af data:", e);
    document.getElementById('loading-overlay').innerHTML = "Fejl: Kunne ikke hente data fra regnearket.";
  }
}

// Start loading
loadServerData();
</script>
</body>
</html>
